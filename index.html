<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản lý khách mời</title>
  <meta name="description" content="Trang quản lý khách mời lễ tốt nghiệp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #fffdf5;
      --accent: #b8922e;
      --text: #1a1004;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      font-size: 18px;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(184, 146, 46, 0.2);
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-top: 0;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
      align-items: flex-end;
      background: var(--bg);
      padding: 20px;
      border-radius: 8px;
      border: 1px dashed var(--accent);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group:nth-child(2) {
      flex: 1;
      min-width: 250px;
    }

    label {
      font-weight: 600;
      font-size: 1.1rem;
    }

    input,
    select {
      padding: 12px 15px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: box-shadow 0.3s;
    }

    input:focus,
    select:focus {
      box-shadow: 0 0 5px rgba(184, 146, 46, 0.5);
    }

    button {
      padding: 12px 25px;
      background-color: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.2s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-secondary:hover {
      background-color: var(--accent);
      color: #fff;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .actions .count {
      font-weight: 600;
      color: var(--accent);
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th,
    td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(184, 146, 46, 0.2);
    }

    th {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      font-size: 1.2rem;
    }

    .link-cell {
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-cell a {
      color: var(--accent);
      text-decoration: none;
    }

    .link-cell a:hover {
      text-decoration: underline;
    }

    .action-cell {
      display: flex;
      gap: 10px;
    }

    .copy-btn {
      padding: 8px 15px;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Quản lý Khách mời</h1>

    <form id="guestForm">
      <div class="form-group">
        <label for="honorific">Xưng hô</label>
        <select id="honorific" required>
          <option value="Anh">Anh</option>
          <option value="Chị">Chị</option>
          <option value="Bạn">Bạn</option>
          <option value="Em">Em</option>
          <option value="Đại Gia Đình">Đại Gia Đình</option>
          <option value="Anh Chị Bạn Trong Động Cầu Lông Nơ Trang Long">Anh Chị Bạn Trong Động Cầu Lông Nơ Trang Long
          </option>
        </select>
      </div>
      <div class="form-group">
        <label for="name">Họ và tên</label>
        <input type="text" id="name" placeholder="Ví dụ: Nguyễn Văn A (có thể để trống)">
      </div>
      <button type="submit">Thêm khách mời</button>
    </form>

    <div class="actions">
      <div class="count">Tổng số: <span id="guestCount">0</span></div>
      <button id="copyAllBtn" class="btn-secondary">Copy tất cả danh sách</button>
    </div>

    <div class="table-container">
      <table id="guestTable">
        <thead>
          <tr>
            <th>Xưng hô</th>
            <th>Họ và tên</th>
            <th>Link thư mời</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody>
          <!-- JS render here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let guests = JSON.parse(localStorage.getItem('guests') || '[]');

    function saveGuests() {
      localStorage.setItem('guests', JSON.stringify(guests));
    }

    function renderGuests() {
      const tbody = document.querySelector('#guestTable tbody');
      tbody.innerHTML = '';
      document.getElementById('guestCount').textContent = guests.length;

      guests.forEach((guest, index) => {
        const tr = document.createElement('tr');

        const honorTd = document.createElement('td');
        honorTd.textContent = guest.honorific;

        const nameTd = document.createElement('td');
        nameTd.textContent = guest.name;

        const linkTd = document.createElement('td');
        linkTd.className = 'link-cell';
        const linkA = document.createElement('a');
        linkA.href = guest.link;
        linkA.target = '_blank';
        linkA.textContent = guest.link;
        linkTd.appendChild(linkA);

        const actionTd = document.createElement('td');
        actionTd.className = 'action-cell';

        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy Link';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(guest.link).then(() => {
            const origText = copyBtn.textContent;
            copyBtn.textContent = 'Đã copy!';
            setTimeout(() => copyBtn.textContent = origText, 2000);
          });
        };

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'copy-btn btn-secondary';
        deleteBtn.textContent = 'Xóa';
        deleteBtn.onclick = () => {
          if (confirm('Bạn có chắc chắn muốn xóa khách mời này?')) {
            guests.splice(index, 1);
            saveGuests();
            renderGuests();
          }
        };

        actionTd.appendChild(copyBtn);
        actionTd.appendChild(deleteBtn);

        tr.appendChild(honorTd);
        tr.appendChild(nameTd);
        tr.appendChild(linkTd);
        tr.appendChild(actionTd);

        tbody.appendChild(tr);
      });
    }

    document.getElementById('guestForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameInput = document.getElementById('name');
      const honorificInput = document.getElementById('honorific');

      const name = nameInput.value.trim().normalize('NFC');
      const honorific = honorificInput.value.normalize('NFC');

      const data = name + '|' + honorific;
      const base64 = btoa(encodeURIComponent(data));

      let basePath = window.location.origin + window.location.pathname.replace('index.html', '').replace(/\/$/, '');
      const link = basePath + '/poster.html?g=' + base64;

      guests.unshift({ name, honorific, link });
      saveGuests();
      renderGuests();

      nameInput.value = '';
      nameInput.focus();
    });

    document.getElementById('copyAllBtn').addEventListener('click', () => {
      if (guests.length === 0) return alert('Chưa có danh sách khách mời.');
      const text = guests.map(g => `${g.honorific}${g.name ? ' ' + g.name : ''}:\n${g.link}`).join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        alert('Đã copy toàn bộ danh sách khách mời vào clipboard!');
      });
    });

    renderGuests();
  </script>
</body>

</html>
